version: '3.8'

services:
  fightarr:
    image: fightarr/fightarr:latest
    container_name: fightarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./config:/config
      - /path/to/downloads:/downloads
      - /path/to/media:/media
    ports:
      - "17878:17878"  # Changed from 7878
    restart: unless-stopped
